<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b2e1a">
  <title>Sahihayn</title>
  <link rel="manifest" href="manifest.webmanifest?v=076">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
  <link rel="stylesheet" href="style.css?v=076">
  <link rel="stylesheet" href="style-fix.css?v=076">
  <link rel="stylesheet" href="no-pull-refresh.css?v=076">
</head>
<body>
  <div class="phone-app">
    <header class="topbar">
      <button class="icon-btn" id="menuBtn">☰</button>
      <div class="brand">
        <h1>Сахихайн</h1>
        <p></p>
      </div>
      <button class="icon-btn" id="searchBtn">⌕</button>
    </header>

    <main id="app"></main>

    <nav class="bottom-nav">
      <button data-page="home" class="active">⌂<span>Главная</span></button>
      <button data-page="search">⌕<span>Поиск</span></button>
      <button data-page="favorites">♡<span>Избранное</span></button>
      <button data-page="settings">⚙<span>Настройки</span></button>
      <div class="nav-credit">© 2026 Adam Margoev · All Rights Reserved</div>
    </nav>
  </div>

  <script src="script.js?v=076"></script>
  <script src="hero-home-074.js?v=076"></script>
  <script src="settings-ui-072.js?v=076"></script>
  <script src="auto-load-073.js?v=076"></script>
  <script>
  let startY=0;
  document.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;},{passive:false});
  document.addEventListener('touchmove',e=>{const y=e.touches[0].clientY;if(window.scrollY===0&&y>startY){e.preventDefault();}},{passive:false});
  </script>
</body>
</html>
